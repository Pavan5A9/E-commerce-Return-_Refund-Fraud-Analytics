<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Shopy Buddy</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&family=Inter:wght@400;500;600&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-color: #0969da;
            --secondary-color: #6e7781;
            --accent-color: #0969da;
        }

        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            margin: 0;
        }

        .welcome-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            padding: 4rem;
            text-align: center;
            max-width: 600px;
            width: 90%;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            animation: float 6s ease-in-out infinite, card-entrance 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            opacity: 0;
            /* Started hidden for entrance */
            transform: translateY(20px);
        }

        h1 {
            font-family: 'Outfit', sans-serif;
            font-weight: 700;
            font-size: 3.5rem;
            margin-bottom: 1rem;
            background: linear-gradient(to right, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.02em;
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.3s forwards;
        }

        p {
            font-size: 1.25rem;
            color: #94a3b8;
            margin-bottom: 3rem;
            line-height: 1.6;
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.5s forwards;
        }

        .btn-enter {
            background: white;
            color: #0f172a;
            font-weight: 600;
            font-size: 1.1rem;
            padding: 1rem 3rem;
            border-radius: 50px;
            text-decoration: none;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            opacity: 0;
            animation: fade-in-up 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) 0.7s forwards, pulse-glow 3s infinite 2s;
        }

        .btn-enter:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 10px 30px rgba(96, 165, 250, 0.4);
            background: #f8fafc;
            color: #0f172a;
        }

        .btn-enter i {
            transition: transform 0.3s ease;
        }

        .btn-enter:hover i {
            transform: translateX(4px);
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes card-entrance {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fade-in-up {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse-glow {

            0%,
            100% {
                box-shadow: 0 0 0 0 rgba(255, 255, 255, 0);
            }

            50% {
                box-shadow: 0 0 20px 0 rgba(255, 255, 255, 0.3);
            }
        }

        /* Background decorations */
        .glow {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.15) 0%, rgba(0, 0, 0, 0) 70%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
            animation: breathe 5s ease-in-out infinite;
        }

        @keyframes breathe {

            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 0.5;
            }

            50% {
                transform: translate(-50%, -50%) scale(1.1);
                opacity: 0.8;
            }
        }
    </style>
</head>

<body>
    <div class="glow"></div>
    <div class="welcome-card">
        <div class="mb-4">
            <i class="ri-shield-check-fill" style="font-size: 4rem; color: #60a5fa;"></i>
        </div>
        <h1>Shopy Buddy</h1>
        <p>Your intelligent partner for secure and seamless e-commerce experiences. Detect fraud, analyze risks, and
            protect your revenue.</p>

        <a href="/home" class="btn-enter">
            Enter Website <i class="ri-arrow-right-line"></i>
        </a>
    </div>
</body>

</html>
